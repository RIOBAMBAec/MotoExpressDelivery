<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Moto Express</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#111;
            color:white;
            padding:30px;
        }

        h1{
            color:#FFD700;
            text-align:center;
            margin-bottom:30px;
        }

        .login-box{
            max-width:420px;
            margin:80px auto;
            background:#1c1c1c;
            border:1px solid #333;
            border-radius:18px;
            padding:30px;
            text-align:center;
        }

        .login-box h2{
            color:#FFD700;
            margin-bottom:20px;
        }

        .login-box input{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:none;
            border-radius:10px;
            font-size:16px;
            box-sizing:border-box;
        }

        .login-box button{
            width:100%;
            margin:0;
            padding:14px;
            font-size:16px;
        }

        .error{
            color:#ff6b6b;
            margin-top:15px;
            font-weight:bold;
        }

        .oculto{
            display:none;
        }

        .pedido{
            background:#1c1c1c;
            border:1px solid #333;
            border-radius:15px;
            padding:20px;
            margin:20px auto;
            max-width:900px;
        }

        .pedido h2{
            color:#FFC107;
            margin-bottom:15px;
        }

        .pedido p{
            margin:8px 0;
        }

        select{
            padding:10px;
            border-radius:8px;
            border:none;
            margin-top:10px;
        }

        button,
        .btn-whatsapp{
            background:#FFD700;
            color:black;
            border:none;
            padding:10px 18px;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
            margin-left:10px;
            text-decoration:none;
            display:inline-block;
            font-size:14px;
        }

        button:hover,
        .btn-whatsapp:hover{
            background:#FFC107;
        }

        .btn-whatsapp{
            background:#25D366;
            color:white;
        }

        .btn-whatsapp:hover{
            background:#1ebe5d;
        }

        .btn-en-camino{
            background:#2196F3;
            color:white;
        }

        .btn-en-camino:hover{
            background:#1976D2;
        }

        .btn-entregado{
            background:#4CAF50;
            color:white;
        }

        .btn-entregado:hover{
            background:#388E3C;
        }

        .estado{
            font-weight:bold;
            color:#FFD700;
        }

        .codigo-real{
            color:#aaa;
            font-size:0.9rem;
            margin-bottom:15px;
        }

        .acciones{
            margin-top:15px;
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            align-items:center;
        }

        .volver{
            display:block;
            width:max-content;
            margin:0 auto 30px;
            background:#FFD700;
            color:#000;
            padding:12px 20px;
            border-radius:10px;
            text-decoration:none;
            font-weight:bold;
        }

        .volver:hover{
            background:#FFC107;
        }

        .cerrar-sesion{
            display:block;
            width:max-content;
            margin:0 auto 30px;
            background:#333;
            color:white;
            padding:12px 20px;
            border-radius:10px;
            text-decoration:none;
            font-weight:bold;
            border:1px solid #FFD700;
            cursor:pointer;
        }

        .cerrar-sesion:hover{
            background:#FFD700;
            color:black;
        }

        @media(max-width:768px){
            body{
                padding:15px;
            }

            button,
            .btn-whatsapp{
                margin-left:0;
                margin-top:10px;
                width:100%;
                text-align:center;
                box-sizing:border-box;
            }

            select{
                width:100%;
            }

            .volver,
            .cerrar-sesion{
                width:100%;
                text-align:center;
                box-sizing:border-box;
            }

            .acciones{
                display:block;
            }
        }
    </style>
</head>

<body>

    <div id="loginBox" class="login-box">
        <h2>Acceso Administrador</h2>

        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">

        <button onclick="iniciarSesion()">Ingresar</button>

        <p id="errorLogin" class="error"></p>
    </div>

    <div id="panelAdmin" class="oculto">

        <h1>Panel Administrativo - Moto Express</h1>

        <a class="volver" href="index.html">Volver a la página principal</a>

        <button class="cerrar-sesion" onclick="cerrarSesion()">Cerrar sesión</button>

        <div id="listaPedidos">
            <p>Cargando pedidos...</p>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {
            getFirestore,
            collection,
            onSnapshot,
            doc,
            updateDoc
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtyU8MpORmsq5zbrbYpCzJ1K5WT3muhhk",
            authDomain: "motoexpressriobamba-6b829.firebaseapp.com",
            projectId: "motoexpressriobamba-6b829",
            storageBucket: "motoexpressriobamba-6b829.firebasestorage.app",
            messagingSenderId: "387045012455",
            appId: "1:387045012455:web:7b8111bf89b5a4b6628342",
            measurementId: "G-B3TPGM5VWW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const loginBox = document.getElementById("loginBox");
        const panelAdmin = document.getElementById("panelAdmin");
        const listaPedidos = document.getElementById("listaPedidos");
        const errorLogin = document.getElementById("errorLogin");

        const ADMIN_USER = "admin";
        const ADMIN_PASS = "MotoExpress2026";

        let pedidosCargados = false;

        function limpiarTelefono(numero){
            let telefono = String(numero || "").replace(/\D/g, "");

            if(telefono.startsWith("0")){
                telefono = "593" + telefono.substring(1);
            }

            if(!telefono.startsWith("593")){
                telefono = "593" + telefono;
            }

            return telefono;
        }

        function crearMensajeCliente(pedido, codigo){
            const mensaje = `Hola ${pedido.nombre || ""}, le saluda Moto Express Riobamba Delivery. Le escribimos sobre su pedido ${codigo}.`;
            return encodeURIComponent(mensaje);
        }

        function crearMensajeEnCamino(pedido, codigo){
            const mensaje = `Hola ${pedido.nombre || ""} 👋\n\nTu pedido ${codigo} ya fue recogido y se encuentra en camino 🚚\n\nMoto Express Riobamba Delivery.`;
            return encodeURIComponent(mensaje);
        }

        function crearMensajeEntregado(pedido, codigo){
            const mensaje = `Hola ${pedido.nombre || ""} 👋\n\nTu pedido ${codigo} ha sido entregado correctamente ✅\n\nGracias por confiar en Moto Express Riobamba Delivery 🚚`;
            return encodeURIComponent(mensaje);
        }

        window.iniciarSesion = function(){

            const usuario = document.getElementById("usuario").value;
            const password = document.getElementById("password").value;

            if(usuario === ADMIN_USER && password === ADMIN_PASS){

                sessionStorage.setItem("adminLogueado", "true");

                loginBox.classList.add("oculto");
                panelAdmin.classList.remove("oculto");

                if(!pedidosCargados){
                    cargarPedidos();
                    pedidosCargados = true;
                }

            }else{
                errorLogin.textContent = "Usuario o contraseña incorrectos.";
            }
        }

        window.cerrarSesion = function(){
            sessionStorage.removeItem("adminLogueado");
            location.reload();
        }

        if(sessionStorage.getItem("adminLogueado") === "true"){
            loginBox.classList.add("oculto");
            panelAdmin.classList.remove("oculto");

            if(!pedidosCargados){
                cargarPedidos();
                pedidosCargados = true;
            }
        }

        function cargarPedidos(){

            onSnapshot(collection(db, "pedidos"), (snapshot) => {

                listaPedidos.innerHTML = "";

                if(snapshot.empty){
                    listaPedidos.innerHTML = "<p>No hay pedidos registrados.</p>";
                    return;
                }

                let contador = 1;

                snapshot.forEach((documento) => {

                    const pedido = documento.data();
                    const id = documento.id;

                    const codigoVisual = pedido.codigo || `ME-${String(contador).padStart(3, "0")}`;
                    const telefonoCliente = limpiarTelefono(pedido.telefono);

                    const mensajeCliente = crearMensajeCliente(pedido, codigoVisual);
                    const mensajeEnCamino = crearMensajeEnCamino(pedido, codigoVisual);
                    const mensajeEntregado = crearMensajeEntregado(pedido, codigoVisual);

                    const linkWhatsApp = `https://wa.me/${telefonoCliente}?text=${mensajeCliente}`;
                    const linkEnCamino = `https://wa.me/${telefonoCliente}?text=${mensajeEnCamino}`;
                    const linkEntregado = `https://wa.me/${telefonoCliente}?text=${mensajeEntregado}`;

                    const div = document.createElement("div");
                    div.classList.add("pedido");

                    div.innerHTML = `
                        <h2>Pedido ${codigoVisual}</h2>

                        <p class="codigo-real"><strong>Código interno:</strong> ${id}</p>

                        <p><strong>Cliente:</strong> ${pedido.nombre || ""}</p>
                        <p><strong>Teléfono:</strong> ${pedido.telefono || ""}</p>
                        <p><strong>Recogida:</strong> ${pedido.recogida || ""}</p>
                        <p><strong>Entrega:</strong> ${pedido.entrega || ""}</p>
                        <p><strong>Tipo:</strong> ${pedido.tipo || ""}</p>
                        <p><strong>Descripción:</strong> ${pedido.descripcion || "Sin descripción"}</p>
                        <p><strong>Fecha:</strong> ${pedido.fecha || "No especificada"}</p>
                        <p><strong>Hora:</strong> ${pedido.hora || "No especificada"}</p>
                        <p><strong>Recibe:</strong> ${pedido.receptor || ""}</p>
                        <p><strong>Pago:</strong> ${pedido.pago || ""}</p>

                        <p><strong>Estado actual:</strong> <span class="estado">${pedido.estado || "Pendiente"}</span></p>

                        <div class="acciones">
                            <select id="estado-${id}">
                                <option value="Pendiente">Pendiente</option>
                                <option value="Recogido">Recogido</option>
                                <option value="En camino">En camino</option>
                                <option value="Entregado">Entregado</option>
                                <option value="Cancelado">Cancelado</option>
                            </select>

                            <button onclick="actualizarEstado('${id}')">
                                Actualizar estado
                            </button>

                            <a class="btn-whatsapp" href="${linkWhatsApp}" target="_blank">
                                💬 Contactar cliente
                            </a>

                            <a class="btn-whatsapp btn-en-camino" href="${linkEnCamino}" target="_blank">
                                🚚 Notificar en camino
                            </a>

                            <a class="btn-whatsapp btn-entregado" href="${linkEntregado}" target="_blank">
                                📦 Notificar entregado
                            </a>
                        </div>
                    `;

                    listaPedidos.appendChild(div);

                    contador++;
                });
            });
        }

        window.actualizarEstado = async function(id){

            const nuevoEstado = document.getElementById(`estado-${id}`).value;

            await updateDoc(doc(db, "pedidos", id), {
                estado: nuevoEstado
            });

            alert("Estado actualizado correctamente");
        }
    </script>

</body>

</html>
